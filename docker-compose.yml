version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: esim
      POSTGRES_PASSWORD: esim123
      POSTGRES_DB: esim_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esim -d esim_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://esim:esim123@db:5432/esim_db
      SESSION_SECRET: local-dev-secret-change-in-prod
      PORT: 3000
      COUNTRY: TR
      OFFERS_LIMIT: 100
      ZENDIT_API_BASE: https://api.zendit.io/v1
      ZENDIT_API_KEY: sand_f78d3a0c-45da-4cb8-bb98-f5a5e47c061f68b9746c4809099222b4188a
      APP_URL: http://localhost:3000
      # SMTP bos birakildi - email console'a yazilacak
      SMTP_HOST: ""
      SMTP_PORT: ""
      SMTP_USER: ""
      SMTP_PASS: ""
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    restart: unless-stopped

volumes:
  pgdata:
