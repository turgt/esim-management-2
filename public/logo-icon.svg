<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="globe-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Globe filled -->
  <circle cx="32" cy="32" r="30" fill="url(#globe-grad)"/>
  <!-- Globe lines -->
  <ellipse cx="32" cy="32" rx="12" ry="30" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <line x1="2" y1="32" x2="62" y2="32" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
  <line x1="8" y1="18" x2="56" y2="18" stroke="#fff" stroke-width="0.6" opacity="0.2"/>
  <line x1="8" y1="46" x2="56" y2="46" stroke="#fff" stroke-width="0.6" opacity="0.2"/>
  <!-- SIM chip -->
  <rect x="20" y="20" width="24" height="24" rx="4" fill="none" stroke="#fff" stroke-width="2.5"/>
  <line x1="32" y1="20" x2="32" y2="44" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="32" x2="44" y2="32" stroke="#fff" stroke-width="1" opacity="0.6"/>
  <line x1="20" y1="26" x2="32" y2="26" stroke="#fff" stroke-width="0.6" opacity="0.4"/>
  <line x1="32" y1="38" x2="44" y2="38" stroke="#fff" stroke-width="0.6" opacity="0.4"/>
</svg>
